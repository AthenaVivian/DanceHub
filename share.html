<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="DanceHub read-only shared dashboard.">
  <title>DanceHub Shared Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#151210;--panel:#211c19;--panel-2:#29231f;--text:#f4eee7;--muted:#b5a9a0;--line:rgba(255,255,255,.1);--accent:#8f7bff;--blue:#79c7d3;--coral:#f06a55}
    *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 18% 8%,rgba(143,123,255,.24),transparent 28%),radial-gradient(circle at 90% 4%,rgba(121,199,211,.16),transparent 24%),var(--bg);color:var(--text);font-family:"DM Sans",system-ui,sans-serif}
    main{max-width:1200px;margin:0 auto;padding:44px 22px 72px}header{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:28px}.brand{display:flex;align-items:center;gap:16px}.mark{display:grid;place-items:center;width:54px;height:54px;border-radius:18px;background:linear-gradient(135deg,var(--accent),var(--blue));color:#10100f;font-weight:900;box-shadow:0 18px 40px rgba(143,123,255,.32)}h1,h2{font-family:"Instrument Serif",Georgia,serif;font-weight:400;margin:0}h1{font-size:64px;line-height:.9}h2{font-size:34px}.eyebrow{margin:0 0 8px;color:var(--muted);font-size:12px;font-weight:800;letter-spacing:.18em;text-transform:uppercase}p,small{color:var(--muted)}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.stat,.card,.table-wrap{background:linear-gradient(180deg,rgba(41,35,31,.96),rgba(33,28,25,.94));border:1px solid var(--line);border-radius:22px;box-shadow:0 26px 90px rgba(0,0,0,.3)}.stat{padding:24px}.stat b{display:block;margin-top:12px;font-family:"Instrument Serif",Georgia,serif;font-size:58px;font-weight:400}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:16px}.card{padding:24px}.rank{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center;padding:11px 0;border-bottom:1px solid var(--line)}.bar{grid-column:1 / -1;height:6px;border-radius:999px;background:rgba(255,255,255,.12);overflow:hidden}.bar span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent),var(--blue))}.table-wrap{margin-top:16px;overflow:auto}table{width:100%;border-collapse:collapse}th,td{padding:15px 18px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{color:var(--muted);font-size:11px;letter-spacing:.14em;text-transform:uppercase}.class-name{font-weight:800}.style{display:block;margin-top:4px;color:var(--muted);font-size:12px}.empty{padding:38px;text-align:center}.error{max-width:760px;margin:16vh auto;padding:28px;border:1px solid rgba(240,106,85,.45);border-radius:22px;background:rgba(240,106,85,.08)}@media(max-width:800px){header,.stats,.grid{display:block}.stat,.card{margin-bottom:14px}h1{font-size:48px}}
  </style>
</head>
<body>
  <main id="app"></main>
  <script>
    const app = document.querySelector("#app");
    const escapeHtml = value => String(value ?? "").replace(/[&<>"']/g, char => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" }[char]));
    const formatDate = value => value ? new Date(`${value}T00:00:00`).toLocaleDateString(undefined, { month:"short", day:"numeric", year:"numeric" }) : "Date unknown";
    const formatTime = value => {
      if (!value) return "";
      const [hour, minute] = value.split(":").map(Number);
      return new Date(2000, 0, 1, hour, minute).toLocaleTimeString([], { hour:"numeric", minute:"2-digit" });
    };
    function decodePayload() {
      const params = new URLSearchParams(location.hash.replace(/^#/, ""));
      const encoded = params.get("data");
      if (!encoded) throw new Error("This share link is missing dashboard data.");
      const padded = encoded.replace(/-/g, "+").replace(/_/g, "/") + "=".repeat((4 - encoded.length % 4) % 4);
      const binary = atob(padded);
      const bytes = Uint8Array.from(binary, char => char.charCodeAt(0));
      return JSON.parse(new TextDecoder().decode(bytes));
    }
    function rank(title, rows = []) {
      const max = Math.max(...rows.map(row => row[1]), 1);
      return `<section class="card"><p class="eyebrow">${escapeHtml(title)}</p><h2>${escapeHtml(title.replace("Classes by ", ""))}</h2>${rows.length ? rows.map(([name,count]) => `<div class="rank"><span>${escapeHtml(name)}</span><b>${count}</b><div class="bar"><span style="width:${Math.round(count / max * 100)}%"></span></div></div>`).join("") : "<p>No data</p>"}</section>`;
    }
    function render(data) {
      const stats = data.stats || {};
      const rows = [...(data.classes || [])].sort((a,b) => Date.parse(`${b.date || "0000-01-01"}T${b.time || "00:00"}:00`) - Date.parse(`${a.date || "0000-01-01"}T${a.time || "00:00"}:00`));
      app.innerHTML = `
        <header>
          <div class="brand"><div class="mark">DH</div><div><p class="eyebrow">Shared read-only dashboard</p><h1>DanceHub</h1><p>No Gmail access, no editing, just the snapshot your friend shared.</p></div></div>
          <small>Generated ${escapeHtml(data.generatedAt ? new Date(data.generatedAt).toLocaleString() : "unknown")}</small>
        </header>
        <section class="stats">
          <div class="stat"><small>Classes kept</small><b>${stats.net || 0}</b></div>
          <div class="stat"><small>Total booked</small><b>${stats.booked || 0}</b></div>
          <div class="stat"><small>Total canceled</small><b>${stats.canceled || 0}</b></div>
        </section>
        <section class="grid">${rank("Classes by style", stats.byStyle)}${rank("Classes by studio", stats.byStudio)}${rank("Classes by teacher", stats.byTeacher)}${rank("Classes by month", stats.byMonth)}</section>
        <section class="table-wrap"><table><thead><tr><th>Date</th><th>Class</th><th>Studio</th><th>Teacher</th><th>Platform</th></tr></thead><tbody>
          ${rows.length ? rows.map(record => `<tr><td>${formatDate(record.date)}<span class="style">${formatTime(record.time)}</span></td><td><span class="class-name">${escapeHtml(record.className)}</span><span class="style">${escapeHtml(record.danceStyle)}</span></td><td>${escapeHtml(record.studio)}</td><td>${escapeHtml(record.teacher || "—")}</td><td>${escapeHtml(record.platform || "—")}</td></tr>`).join("") : `<tr><td class="empty" colspan="5">No classes in this shared snapshot.</td></tr>`}
        </tbody></table></section>`;
    }
    try { render(decodePayload()); }
    catch (error) { app.innerHTML = `<section class="error"><h1>DanceHub</h1><p>${escapeHtml(error.message)}</p><p>Ask for a fresh public share link from the main dashboard.</p></section>`; }
  </script>
</body>
</html>
